version: '3.8'

services:
  db:
    image: 'mysql:8.0'
    container_name: mgstore_db_container
    restart: always
    ports:
      - '3307:3306'
    environment:
      - MYSQL_DATABASE=ecommerce_db
      - MYSQL_USER=user
      - MYSQL_PASSWORD=1234
      - MYSQL_ROOT_PASSWORD=1234
    volumes:
      - ecommerce-app_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uuser", "-p1234"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ecommerce-network

  backend:
    build:
      context: ./backend/my-app
      dockerfile: Dockerfile
    image: ecommerce-app-backend
    container_name: ecommerce_backend
    ports:
      - '8080:8080'
    environment:
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.MySQLDialect
      - JWT_SECRET=MGSTORE_SECURE_KEY_2026_MUSTAFA_DEVELOPMENT_BACKEND_SPRING_BOOT_JWT_TOKEN_512_BITS
      - JWT_EXPIRATION=86400000
      - SPRING_DATASOURCE_PASSWORD=1234
      - APP_UPLOAD_DIR=/app/uploads
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/ecommerce_db?createDatabaseIfNotExist=true
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    env_file:
      - .env.dev
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ecommerce-network

  frontend:
    build:
      context: ./frontend/my-app
      dockerfile: Dockerfile
    image: ecommerce-app-frontend
    container_name: ecommerce_frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api
      - NEXT_TELEMETRY_DISABLED=1
    working_dir: /app
    #command: sh -c "npm install && npm run build"
    depends_on:
      - backend
    networks:
      - ecommerce-network
  jenkins:
    image: jenkins/jenkins:lts
    container_name: mgstore_jenkins
    restart: always
    privileged: true
    user: root
    ports:
      - '8081:8080'
      - '50000:50000'
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - /usr/local/bin/docker:/usr/bin/docker
      - /usr/local/bin/docker-compose:/usr/local/bin/docker-compose
    networks:
      - ecommerce-network
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - ecommerce-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

    networks:
      - ecommerce-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8085:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      - kafka
    networks:
      - ecommerce-network
    links:
      - kafka

volumes:
  ecommerce-app_mysql_data:
    name: ecommerce-app_mysql_data
  jenkins_home:
  uploads_data:

networks:
  ecommerce-network:
    driver: bridge