spring:
  datasource:
    url: jdbc:mysql://db:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: user
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true


  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB
app:
  upload:
    dir: uploads
    max-size: 5MB
  jwt:
    secret: ${JWT_SECRET:default_very_long_secret_key_for_dev_only}
    expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE